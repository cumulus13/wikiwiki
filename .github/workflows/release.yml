name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── 1. Verify the build compiles cleanly on all platforms ──────────────────
  verify:
    name: Verify release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: wikiwiki.exe
            artifact_name: wikiwiki-win
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: wikiwiki
            artifact_name: wikiwiki-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: wikiwiki
            artifact_name: wikiwiki-macos
    
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}
          retention-days: 1

  # ─── 2. Create a GitHub Release and attach all binaries ────────────────────
  github-release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          # Windows
          mv dist/wikiwiki-win/wikiwiki.exe dist/wikiwiki-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe
          
          # Linux
          mv dist/wikiwiki-linux/wikiwiki dist/wikiwiki-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          chmod +x dist/wikiwiki-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          
          # macOS
          mv dist/wikiwiki-macos/wikiwiki dist/wikiwiki-${{ github.ref_name }}-x86_64-apple-darwin
          chmod +x dist/wikiwiki-${{ github.ref_name }}-x86_64-apple-darwin

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          for file in wikiwiki-*; do
            if [ -f "$file" ] && [ "${file##*.}" != "sha256" ]; then
              sha256sum "$file" > "${file}.sha256"
              echo "SHA256 ($file): $(cat ${file}.sha256 | cut -d' ' -f1)"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "wikiwiki ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## wikiwiki ${{ github.ref_name }}

            ### Installation

            #### Windows
            Download `wikiwiki-${{ github.ref_name }}-x86_64-pc-windows-msvc.exe` and place it anywhere on your `%PATH%`.

            #### Linux
            Download `wikiwiki-${{ github.ref_name }}-x86_64-unknown-linux-gnu`, make it executable with `chmod +x`, and move it to a directory in your `$PATH` (e.g., `/usr/local/bin`).

            #### macOS
            Download `wikiwiki-${{ github.ref_name }}-x86_64-apple-darwin`, make it executable with `chmod +x`, and move it to a directory in your `$PATH`.

            #### Via cargo
            ```bash
            cargo install wikiwiki
            ```

            ### SHA-256 Checksums
            ```
            ${{ toJSON(steps.generate.outputs.checksums) }}
            ```
          files: |
            dist/wikiwiki-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 3. Publish to crates.io ────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Dry-run cargo publish
        run: cargo publish --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}